<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카카오 임팩트 챌린지 with 제주대학교</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  /* 카카오 공식 폰트 (Kakao Small Sans) — 상업용 무료, 로드 실패 시 맑은 고딕으로 폴백 */
  @font-face{font-family:'Kakao Small Sans';font-weight:300;font-style:normal;font-display:swap;
    src:url('https://cdn.jsdelivr.net/gh/fonts-archive/KakaoSmallSans/KakaoSmallSans-Light.woff2') format('woff2'),
        url('https://cdn.jsdelivr.net/gh/fonts-archive/KakaoSmallSans/KakaoSmallSans-Light.woff') format('woff');}
  @font-face{font-family:'Kakao Small Sans';font-weight:400;font-style:normal;font-display:swap;
    src:url('https://cdn.jsdelivr.net/gh/fonts-archive/KakaoSmallSans/KakaoSmallSans-Regular.woff2') format('woff2'),
        url('https://cdn.jsdelivr.net/gh/fonts-archive/KakaoSmallSans/KakaoSmallSans-Regular.woff') format('woff');}
  @font-face{font-family:'Kakao Small Sans';font-weight:700;font-style:normal;font-display:swap;
    src:url('https://cdn.jsdelivr.net/gh/fonts-archive/KakaoSmallSans/KakaoSmallSans-Bold.woff2') format('woff2'),
        url('https://cdn.jsdelivr.net/gh/fonts-archive/KakaoSmallSans/KakaoSmallSans-Bold.woff') format('woff');}
  /* 제목용 카카오 큰글씨 (Kakao Big Sans) */
  @font-face{font-family:'Kakao Big Sans';font-weight:400;font-style:normal;font-display:swap;
    src:url('https://cdn.jsdelivr.net/gh/fonts-archive/KakaoBigSans/KakaoBigSans-Regular.woff2') format('woff2'),
        url('https://cdn.jsdelivr.net/gh/fonts-archive/KakaoBigSans/KakaoBigSans-Regular.woff') format('woff');}
  @font-face{font-family:'Kakao Big Sans';font-weight:700;font-style:normal;font-display:swap;
    src:url('https://cdn.jsdelivr.net/gh/fonts-archive/KakaoBigSans/KakaoBigSans-Bold.woff2') format('woff2'),
        url('https://cdn.jsdelivr.net/gh/fonts-archive/KakaoBigSans/KakaoBigSans-Bold.woff') format('woff');}
  @font-face{font-family:'Kakao Big Sans';font-weight:800;font-style:normal;font-display:swap;
    src:url('https://cdn.jsdelivr.net/gh/fonts-archive/KakaoBigSans/KakaoBigSans-ExtraBold.woff2') format('woff2'),
        url('https://cdn.jsdelivr.net/gh/fonts-archive/KakaoBigSans/KakaoBigSans-ExtraBold.woff') format('woff');}
  h1,h2,h3,.ptitle h2,.kicker{font-family:"Kakao Big Sans","Kakao Small Sans","Malgun Gothic","Noto Sans KR",sans-serif}
  :root{
    --ink:#2E2622; --ocean:#5A4A42; --ocean-dk:#3A2E28; --teal:#8A7A6E;
    --sea:#FFF8E1; --sea2:#FBEFD0; --tan:#E8712B; --tan-dk:#CE5E1E;
    --muted:#8A7F72; --line:#EADFC4; --white:#fff; --violet:#3B7DD8;
    --kakao:#FEE500; --kakaod:#F5D800; --red:#E8452F; --green:#6FA84B;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Kakao Small Sans","Malgun Gothic","Noto Sans KR","Apple SD Gothic Neo",system-ui,sans-serif;
    color:var(--ink);background:var(--sea);line-height:1.55;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1040px;margin:0 auto;padding:0 20px 80px}
  header{background:var(--kakao);color:var(--ink);padding:24px 0 20px;position:relative;overflow:hidden}
  header .wrap{position:relative;z-index:2;padding-bottom:0}
  header .ryan{position:absolute;right:26px;bottom:-10px;height:104px;z-index:1;pointer-events:none;user-select:none}
  @media(max-width:760px){header .ryan{height:66px;right:8px;bottom:-6px}}
  .login .loginryan{display:block;width:240px;max-width:70%;margin:0 auto -20px;position:relative;z-index:2;pointer-events:none}
  .kicker{color:var(--tan-dk);font-weight:700;letter-spacing:2px;font-size:13px}
  h1{font-size:28px;margin:4px 0 8px;color:var(--ink)}
  .flowline{color:#6b5c50;font-size:14px}
  .flowline b{color:var(--tan-dk)}
  .meta{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
  .meta span{background:#fff;border:1px solid var(--line);color:var(--ink);border-radius:20px;padding:5px 14px;font-size:13px;font-weight:700}
  /* userbar */
  #userbar{display:flex;align-items:center;gap:10px;margin-top:16px;flex-wrap:wrap}
  #userbar .who{background:var(--ocean);color:#fff;border-radius:22px;padding:7px 16px;font-size:14px;font-weight:700}
  #userbar .who b{color:var(--kakao)}
  #userbar .out{margin-left:auto;background:#fff;border:1px solid var(--line);color:var(--ocean);border-radius:20px;
    padding:6px 14px;font-size:12.5px;cursor:pointer;font-family:inherit;font-weight:700}
  #userbar .livehint{color:#7a6d5e;font-size:12px}
  .stepper{display:flex;gap:6px;margin:22px 0 8px;flex-wrap:wrap}
  .stepper button{flex:1;min-width:92px;border:none;cursor:pointer;background:#fff;border:1px solid var(--line);
    border-radius:10px;padding:9px 6px;font-size:12.5px;font-weight:700;color:var(--muted);transition:.15s;font-family:inherit}
  .stepper button .n{display:inline-flex;width:20px;height:20px;border-radius:50%;background:var(--sea2);color:var(--ocean);
    align-items:center;justify-content:center;font-size:11px;margin-right:5px}
  .stepper button.active{background:var(--ocean);color:#fff;border-color:var(--ocean)}
  .stepper button.active .n{background:var(--tan);color:#fff}
  .stepper button.done .n{background:var(--teal);color:#fff}
  .panel{background:#fff;border:1px solid var(--line);border-radius:16px;padding:26px;margin-top:14px;box-shadow:0 8px 24px rgba(10,59,64,.06)}
  .phead{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:4px}
  .ptitle{display:flex;align-items:center;gap:12px}
  .ptitle .badge{width:44px;height:44px;border-radius:50%;background:var(--tan);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;flex-shrink:0}
  .ptitle .sub{font-size:12px;font-weight:700;color:var(--teal);letter-spacing:1px}
  .ptitle h2{font-size:22px;line-height:1.2}
  .timer{display:flex;align-items:center;gap:8px;background:var(--sea);border-radius:12px;padding:6px 10px}
  .timer .t{font-variant-numeric:tabular-nums;font-weight:700;font-size:18px;color:var(--ocean);min-width:56px;text-align:center}
  .timer button{border:none;background:var(--ocean);color:#fff;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:14px;font-family:inherit}
  .timer button.reset{background:var(--sea2);color:var(--ocean)}
  .prompt{background:#FBEBD9;border-radius:10px;padding:13px 16px;margin:16px 0;font-size:14.5px}
  .prompt b{color:var(--tan-dk)}
  .tip{font-size:12.5px;color:var(--muted);font-style:italic;margin-top:14px}
  .tip b{color:var(--teal);font-style:normal}
  label.fl{display:block;font-size:12px;font-weight:700;color:var(--teal);margin:0 0 5px}
  input[type=text],textarea,select{width:100%;border:1.5px solid var(--line);border-radius:9px;padding:10px 12px;font-family:inherit;font-size:14px;color:var(--ink);resize:vertical;background:#fff}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--teal)}
  textarea{min-height:60px}
  .member{border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px;background:#fff}
  .member.me{border-color:var(--tan);background:#FFFaf4}
  .member .mtop{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .member .mnum{width:30px;height:30px;border-radius:50%;background:var(--ocean);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
  .member .mtop input{flex:1;font-weight:700}
  .member .mebadge{background:var(--tan);color:#fff;font-size:11px;font-weight:700;border-radius:12px;padding:3px 10px}
  .member .del{border:none;background:none;color:var(--muted);cursor:pointer;font-size:20px;padding:0 6px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:720px){.grid2{grid-template-columns:1fr}}
  .btn{border:none;border-radius:10px;padding:11px 20px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
  .btn.primary{background:var(--ocean);color:#fff}
  .btn.ghost{background:var(--sea2);color:var(--ocean)}
  .btn.tan{background:var(--tan);color:#fff}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .navbtns{display:flex;justify-content:space-between;margin-top:22px;gap:10px}
  .addbtn{background:var(--sea);border:1.5px dashed var(--teal);color:var(--ocean);border-radius:10px;padding:11px;width:100%;font-weight:700;cursor:pointer;font-size:14px;font-family:inherit}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
  .chip{background:var(--sea2);color:var(--ocean);border-radius:20px;padding:5px 13px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid transparent;user-select:none}
  .chip.sel{background:var(--tan);color:#fff}
  .chip.ai{background:#fff;border:1.5px dashed var(--violet);color:var(--violet)}
  .chip.ai:hover{background:#F3F0FA}
  .idea-ref{background:var(--sea);border-radius:9px;padding:10px 12px;font-size:13px;color:var(--muted);margin:6px 0 8px}
  .idea-ref b{color:var(--ink)}
  .aibtn{background:#F3F0FA;border:1.5px solid var(--violet);color:var(--violet);border-radius:20px;padding:6px 14px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
  .aibtn:hover{background:#E9E4F5}
  .ailabel{font-size:11.5px;color:var(--violet);font-weight:700;margin:8px 0 2px;display:flex;align-items:center;gap:5px}
  .aibanner{background:#F3F0FA;border:1px solid #d9d1ee;border-radius:10px;padding:12px 15px;margin:10px 0;font-size:13.5px;color:#403266}
  .aibanner b{color:var(--violet)}
  .aicard{border:1.5px solid var(--violet);border-radius:11px;padding:12px 14px;margin-bottom:8px;background:#FaF9FE;display:flex;align-items:center;gap:12px}
  .aicard .rank{width:26px;height:26px;border-radius:50%;background:var(--violet);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
  .aicard .body{flex:1}
  .aicard .body .lab{font-weight:700}
  .aicard .body .mem{font-size:12px;color:var(--muted)}
  .themecard{border:1.5px solid var(--line);border-radius:13px;padding:16px;margin-bottom:12px;transition:.15s}
  .themecard.on{border-color:var(--tan);background:#FFF7EF;box-shadow:0 4px 14px rgba(242,145,61,.18)}
  .themecard.rec{box-shadow:0 0 0 2px var(--violet) inset}
  .themecard .th{display:flex;align-items:center;gap:12px;margin-bottom:8px;cursor:pointer}
  .themecard .tnum{width:38px;height:38px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}
  .themecard h3{font-size:19px}
  .themecard .sub-chips{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 10px}
  .themecard .sub-chips span{background:var(--sea2);color:var(--ocean);border-radius:16px;padding:3px 11px;font-size:12px;font-weight:700}
  .voterow{display:flex;align-items:center;gap:12px;margin-top:10px;flex-wrap:wrap}
  .voterow .lbl{font-size:12px;font-weight:700;color:var(--muted)}
  .vote{display:flex;align-items:center;gap:8px}
  .vote button{width:30px;height:30px;border-radius:8px;border:none;background:var(--sea2);color:var(--ocean);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
  .vote .cnt{min-width:26px;text-align:center;font-weight:700;font-size:17px;color:var(--ocean)}
  .dots{color:var(--tan);letter-spacing:2px;font-size:15px}
  .tag{display:inline-block;color:#fff;font-size:11px;font-weight:700;border-radius:12px;padding:2px 10px;margin-left:6px}
  .tag.win{background:var(--tan)} .tag.ai{background:var(--violet)}
  .result-hero{background:var(--ocean-dk);color:#fff;border-radius:14px;padding:22px;margin-bottom:16px}
  .result-hero .teamname{color:var(--tan);font-weight:700;font-size:14px;margin-bottom:6px}
  .result-hero .path{color:#E4D3BE;font-size:13px;margin-bottom:10px}
  .result-hero .path b{color:var(--tan)}
  .result-hero h2{font-size:24px;line-height:1.3}
  .rgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:720px){.rgrid{grid-template-columns:1fr}}
  .rbox{border:1px solid var(--line);border-radius:12px;padding:16px}
  .rbox h4{font-size:14px;color:var(--teal);margin-bottom:8px}
  .pitch{font-size:15px;line-height:1.9}
  .pitch b{color:var(--tan-dk)}
  .check{display:flex;align-items:center;gap:10px;padding:7px 0;cursor:pointer}
  .check .box{width:24px;height:24px;border-radius:6px;border:2px solid var(--teal);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;color:#fff;font-size:14px}
  .check.on .box{background:var(--teal)}
  .roletbl{width:100%;border-collapse:collapse;margin-top:6px;font-size:13px}
  .roletbl th{background:var(--teal);color:#fff;padding:8px;text-align:left;font-size:12.5px}
  .roletbl td{border:1px solid var(--line);padding:8px;vertical-align:top}
  .hidden{display:none}
  .miniflow{display:flex;flex-direction:column;gap:0;margin-top:6px}
  .miniflow .mf{border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;color:#fff}
  .miniflow .arw{text-align:center;color:var(--tan);font-size:11px;line-height:1.4}
  /* login */
  .login{max-width:460px;margin:26px auto 0}
  .login .lcard{background:#fff;border:1px solid var(--line);border-radius:18px;padding:30px;box-shadow:0 12px 30px rgba(10,59,64,.1)}
  .login h2{font-size:23px;margin-bottom:4px}
  .login p.desc{color:var(--muted);font-size:13.5px;margin-bottom:20px}
  .teamsel{display:flex;gap:8px;margin-top:6px}
  .teamsel button{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:12px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;font-size:14px}
  .teamsel button.on{background:var(--ocean);color:#fff;border-color:var(--ocean)}
  .login .note{font-size:12px;color:var(--muted);margin-top:16px;background:var(--sea);border-radius:9px;padding:11px 13px}
</style>
</head>

/* ============================================================

   (미설정 시 자동으로 로컬 단일기기 모드로 동작)
   값 위치: Supabase 대시보드 → Settings → API
   ============================================================ */
const SUPABASE_URL  = "https://ftfxnfimfiwkgcejgeuq.supabase.co";   // base URL만 (뒤에 /rest/v1/ 붙이지 말 것)
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0ZnhuZmltZml3a2djZWpnZXVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MjExODcsImV4cCI6MjA5OTQ5NzE4N30.bwgRjmIYLG8Xxvra7_FZS0j8SqAPaAtqzBYfvNKYbpg";

const ADMIN_CODE = "jeju2026";   // 관리자 코드(선택). 비워두면 코드 없이 입장, 값을 넣으면 그 코드를 입력해야 입장.
const TEAM_LABEL = {team1:"팀 1",team2:"팀 2",team3:"팀 3"};
const TEAM_KEYS = ["team1","team2","team3"];
const SUPA={sb:null,room:null,connected:false,reason:null,adminChans:[],adminTimer:null};
function teamKey(){return ({'팀 1':'team1','팀 2':'team2','팀 3':'team3'})[state.user.team]||('team_'+String(state.user.team||'x').replace(/[^A-Za-z0-9]+/g,'_'));}
function supaClient(){if(!SUPA.sb&&SUPA_ENABLED&&typeof window.supabase!=='undefined')SUPA.sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON);return SUPA.sb;}
const SUPA_ENABLED = /^https:\/\/.+\.supabase\.co/.test(SUPABASE_URL) && SUPABASE_ANON.length>20;
const SHARED=['members','clusters','themeNotes','themeVotes','selectedTheme','subtopic','subReason','teamName','teamTopic','ideaMemo','checks'];
let applyingRemote=false, syncT=null, suppressUntil=0;
function now(){return Date.now();}
function serialize(){const o={};SHARED.forEach(k=>o[k]=state[k]);return JSON.parse(JSON.stringify(o));}
function applyRemote(data){if(!data)return;applyingRemote=true;SHARED.forEach(k=>{if(data[k]!==undefined)state[k]=data[k];});if(state.loggedIn)render();applyingRemote=false;}
function onRemoteReset(fresh){clearTimeout(syncT);suppressUntil=now()+1800;applyingRemote=true;
  const f=fresh||freshShared();SHARED.forEach(k=>{state[k]=(f[k]!==undefined?f[k]:state[k]);});
  if(state.loggedIn&&!state.adminMode)render();applyingRemote=false;}
function scheduleSync(){if(!SUPA.connected||applyingRemote||now()<suppressUntil)return;clearTimeout(syncT);syncT=setTimeout(pushState,300);}
async function pushState(){try{if(!SUPA.connected)return;const s=serialize();const key=teamKey();
  if(SUPA.room)await SUPA.room.send({type:'broadcast',event:'state',payload:{state:s}});
  const {error}=await SUPA.sb.from('workspaces').upsert({team_code:key,state:s});
  if(error)console.warn('[sync] DB 저장 실패(RLS/테이블 확인):',error.message);
}catch(e){console.warn('[sync]',e);}}
async function joinRoom(){
  if(!SUPA_ENABLED)return {ok:false,reason:'local'};
  if(typeof window.supabase==='undefined')return {ok:false,reason:'lib'};
  try{
    SUPA.sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
    const key=teamKey();
    // 기존 상태 로드 (실패해도 진행)
    try{const {data:row,error}=await SUPA.sb.from('workspaces').select('state').eq('team_code',key).maybeSingle();
      if(error)console.warn('[join] 상태 로드 실패(테이블/RLS 확인):',error.message);
      else if(row&&row.state)applyRemote(row.state);}catch(e){console.warn('[join] load',e);}
    // 실시간 채널 (ascii 안전 키) — 구독 확정 시에만 connected
    return await new Promise((resolve)=>{
      let done=false;
      SUPA.room=SUPA.sb.channel('room-'+key,{config:{broadcast:{self:false}}});
      SUPA.room.on('broadcast',{event:'state'},({payload})=>applyRemote(payload.state))
        .on('broadcast',{event:'reset'},({payload})=>onRemoteReset(payload&&payload.state))
        .subscribe((status,err)=>{
          console.log('[join] realtime status:',status,err||'');
          if(status==='SUBSCRIBED'){SUPA.connected=true;if(state.loggedIn)renderUserbar();if(!done){done=true;resolve({ok:true});}}
          else if(status==='CHANNEL_ERROR'||status==='TIMED_OUT'||status==='CLOSED'){SUPA.reason='realtime';if(!done){done=true;resolve({ok:false,reason:'realtime'});}}
        });
      setTimeout(()=>{if(!done){done=true;resolve({ok:SUPA.connected,reason:SUPA.connected?null:'timeout'});}},9000);
    });
  }catch(e){console.warn('[join]',e);return {ok:false,reason:'error'};}
}

const THEMES=[
  {key:"지역경제",color:"#0E5C63",subs:["일자리","상권 활성화","스마트팜","창업"]},

];

/* ===== 실제 AI(저비용 모델) 연결 =====
   USE_REMOTE_AI=true 이고 Supabase Edge Function 'ai-suggest' 가 배포돼 있으면
   실제 LLM을 사용하고, 실패하면 자동으로 아래 오프라인 엔진으로 폴백합니다.
   (API 키는 클라이언트가 아니라 Edge Function 환경변수에만 저장) */
const USE_REMOTE_AI = true;
const _aiCache={};   // 같은 입력 재요청은 캐시로 처리해 쿼터 절약
function isQuota(e){return /429|quota|exceed/i.test(String((e&&e.message)||e||''));}
async function aiCall(task,payload){
  const sb=supaClient();
  if(!USE_REMOTE_AI||!sb) throw new Error('local');
  const ck=task+':'+JSON.stringify(payload);
  if(_aiCache[ck]!==undefined) return _aiCache[ck];
  const {data,error}=await sb.functions.invoke('ai-suggest',{body:{task,payload}});
  if(error){let detail=error.message||String(error);
    try{if(error.context&&error.context.text){const t=await error.context.text();detail=t||detail;}}catch(_){}
    console.warn('[ai-suggest] 함수 호출 실패:',detail);throw error;}
  if(!data||data.error||data.result===undefined){console.warn('[ai-suggest] 원인:',(data&&(data.error||data.raw))||'no result');throw new Error((data&&data.error)||'no result');}
  _aiCache[ck]=data.result;
  return data.result;

// 동사·형용사 활용형(예: 차지하는, 보이는, 해결하는, 필요한) 걸러내기 — 명사 위주만 남김
const VERB_END=/(하는|되는|시키는|스러운|로운|다운|같은|보이는|없는|있는|지는|이는|리는|기는|하여|되어|해야|돼야|하기|되기)$/;
function looksVerb(w){
  if(!w)return true;
  if(VERB_END.test(w))return true;
  if(/(하|되)$/.test(w)&&w.length>=2)return true;                 // 차지하, 해결되 등 어간
  if(/(한|할|해|했|된|될|됨|함|는|은|던|게|서|고|며|음)$/.test(w)&&w.length>=3)return true;
  return false;
}
function nounish(arr){return (arr||[]).filter(w=>w&&!looksVerb(w));}
function aiExtractKeywords(text){
  text=(text||"");
  const hits=LEX.filter(t=>text.includes(t));   // 사전 등록어(모두 명사)는 그대로 신뢰
  const toks=text.split(/[^가-힣A-Za-z0-9]+/).filter(Boolean);
  const gen=[];
  toks.forEach(w=>{let s=w.replace(JOSA,"");if(s.length>=2&&s.length<=6&&!STOP.includes(s)&&!hits.includes(s)&&!gen.includes(s)&&!looksVerb(s))gen.push(s);});
  return [...new Set([...hits,...gen])].slice(0,8);
}

  return Object.entries(map).map(([k,v])=>({key:k,label:CLUSTER_LABEL[k],keys:[...v.keys],members:[...v.mem]}))
    .sort((a,b)=>b.members.length-a.members.length||b.keys.length-a.keys.length).slice(0,3);
}

  return bank.map(t=>t.replace(/\{sub\}/g,sub).replace(/\{kw\}/g,kw));
}
function aiRecommendTheme(members){
  const score={};THEMES.forEach(t=>score[t.key]={n:0,keys:new Set()});
  members.forEach(m=>{(m.keywords||[]).forEach(kw=>{const c=clusterOf(kw);if(!c)return;const th=CLUSTER_THEME[c];if(!th)return;score[th].n++;score[th].keys.add(kw);});});
  const rank=Object.entries(score).map(([k,v])=>({theme:k,n:v.n,keys:[...v.keys]})).sort((a,b)=>b.n-a.n);
  return rank;
}

function adminGateHTML(){
  return `<div style="margin-top:12px;border-top:1px solid var(--line);padding-top:14px">
    <label class="fl">관리자 코드</label>
    <input type="password" id="adminCodeIn" placeholder="관리자 코드 입력" onkeydown="if(event.key==='Enter')verifyAdmin()">
    <button class="btn ghost" style="width:100%;margin-top:10px" onclick="verifyAdmin()">관리자 스페이스 입장</button>
    <div id="adminGateMsg" style="color:#c0392b;font-size:12.5px;margin-top:6px"></div></div>`;
}
function enterAdmin(){
  if(!SUPA_ENABLED){const n=$("#loginNote");if(n){n.textContent="관리자 스페이스는 Supabase 연결이 필요합니다. 코드 상단 URL·ANON_KEY를 채워주세요.";n.style.color="#c0392b";}return;}
  if(ADMIN_CODE){state.adminGate=true;renderLogin();setTimeout(()=>{const el=$("#adminCodeIn");if(el)el.focus();},50);return;}
  openAdmin();
}
function verifyAdmin(){
  const el=$("#adminCodeIn");const v=el?el.value:"";
  if(v!==ADMIN_CODE){const m=$("#adminGateMsg");if(m)m.textContent="코드가 올바르지 않습니다.";return;}
  openAdmin();
}
function openAdmin(){
  state.adminGate=false;state.adminMode=true;state.loggedIn=true;
  $("#userbar").classList.remove("hidden");
  render();
  adminConnect();
}
function pickTeam(t){const nm=$("#loginName");if(nm)state.user.name=nm.value;state.user.team=t;renderLogin();$("#loginName").focus();}
async function doLogin(){
  const nm=$("#loginName").value.trim();
  if(!nm){$("#loginName").style.borderColor="#c0392b";$("#loginName").focus();return;}
  if(!state.user.team)state.user.team="팀 1";
  state.user.name=nm;
  if(SUPA_ENABLED){
    const btn=$("#enterBtn");if(btn){btn.textContent="연결 중…";btn.disabled=true;}
    const r=await joinRoom();SUPA.reason=r.reason||null;
    if(btn){btn.textContent="워크스페이스 입장 →";btn.disabled=false;}
    // 실패해도 로컬로 진행 — 상태는 상단바에 표시
  }
  state.loggedIn=true;
  // 같은 이름이 이미 있으면 그 카드를 이어서 사용(중복 생성 방지) — 없으면 빈 슬롯/새 슬롯에 등록
  const mine=state.members.find(x=>x.name&&x.name===nm);
  if(!mine){const empty=state.members.find(x=>!x.name);
    if(empty)empty.name=nm; else state.members.push(Object.assign(m(),{name:nm}));}
  state.step=0;render();window.scrollTo({top:0});
  if(SUPA.connected)pushState();
}
function logout(){clearTimer();try{if(SUPA.room)SUPA.sb.removeChannel(SUPA.room);}catch(e){}SUPA.connected=false;SUPA.room=null;state.loggedIn=false;render();window.scrollTo({top:0});}

/* ===== intro (lean — 세부 설명은 슬라이드로) ===== */
function renderIntro(){
  view.innerHTML=`<div class="panel">
    <h2 style="font-size:23px;margin-bottom:8px">${esc(state.user.team)} 워크스페이스</h2>
    <div class="miniflow" style="max-width:560px">${[["① 세부내용 · 개인 4명의 문제·아이디어","var(--ocean)"],["② 소주제 · 공통 키워드","var(--teal)"],["③ 대주제 · 4개 프레임 중 선정  ★전환점","var(--tan)"],["④ 소주제 · 재설정","var(--teal)"],["⑤ 세부내용 · 팀 주제·아이디어","var(--ocean)"]]
      .map((r,k,a)=>`<div class="mf" style="background:${r[1]}">${r[0]}</div>${k<a.length-1?'<div class="arw">▼</div>':''}`).join("")}</div>
    <p style="color:var(--muted);font-size:13px;margin-top:14px">방법 세부 설명은 안내 슬라이드를 참고하세요. 준비되면 시작합니다.</p>
    <div class="navbtns"><span></span><button class="btn primary" onclick="go(1)">워크숍 시작 →</button></div></div>`;
}

/* ===== step1 ===== */
function renderStep1(){
  view.innerHTML=`<div class="panel">${phead(1)}
    <div class="prompt"><b>진행 발문</b> &nbsp;제주에서 가장 해결하고 싶은 문제 하나와 그 해결 아이디어를, 각자 1분씩 소개해 주세요.</div>
    <div id="members"></div>
    <button class="addbtn" onclick="addMember()">+ 팀원 추가</button>${nav(true)}</div>`;
  renderMembers();
}
function renderMembers(){const box=$("#members");box.innerHTML="";
  state.members.forEach((mem,idx)=>{const d=document.createElement("div");d.className="member"+(isMine(mem)?" me":"");
    d.innerHTML=`<div class="mtop"><div class="mnum">${idx+1}</div>
      <input type="text" placeholder="이름" value="${esc(mem.name)}" oninput="state.members[${idx}].name=this.value">
      ${isMine(mem)?'<span class="mebadge">나</span>':''}
      ${state.members.length>2?`<button class="del" onclick="delMember(${idx})">×</button>`:""}</div>
      <div class="grid2"><div><label class="fl">해결하고 싶은 문제</label>
        <textarea oninput="state.members[${idx}].problem=this.value" placeholder="어떤 문제가 왜 신경 쓰이나요?">${esc(mem.problem)}</textarea></div>
      <div><label class="fl">해결 아이디어</label>
        <textarea oninput="state.members[${idx}].idea=this.value" placeholder="어떻게 풀어볼 수 있을까요?">${esc(mem.idea)}</textarea></div></div>`;
    box.appendChild(d);});}
function addMember(){state.members.push(m());renderMembers();}
function delMember(i){state.members.splice(i,1);renderMembers();}

/* ===== step2 ===== */
function renderStep2(){
  view.innerHTML=`<div class="panel">${phead(2)}
    <div class="prompt"><b>진행 발문</b> &nbsp;각자 아이디어에서 핵심 단어를 뽑고, 반복되거나 서로 통하는 키워드끼리 묶어보세요.</div>
    <label class="fl" style="font-size:14px">① 키워드 추출 <span style="color:var(--violet)">— ✨ AI 추천 버튼으로 자동 제안</span></label>
    <div id="kwextract"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:20px;flex-wrap:wrap;gap:8px">
      <label class="fl" style="font-size:14px;color:var(--tan-dk);margin:0">② 공통 키워드 묶음</label>
      <button class="aibtn" onclick="runAiCommon()">✨ AI 공통 키워드 3안 제시</button></div>
    <div id="aicommon"></div>
    <div style="margin-top:12px"><div class="ailabel" style="color:var(--muted)">직접 입력 (수정·추가)</div><div id="clusters"></div></div>
    <button class="addbtn" onclick="addCluster()">+ 묶음 추가</button>${nav(true)}</div>`;
  renderKwExtract();renderAiCommon();renderClusters();
}
function renderKwExtract(){const box=$("#kwextract");box.innerHTML="";
  state.members.forEach((mem,idx)=>{const d=document.createElement("div");d.style.marginBottom="14px";
    d.innerHTML=`<div class="idea-ref"><b>${esc(mem.name||('팀원 '+(idx+1)))}</b>
      <div style="margin-top:4px"><b style="color:var(--tan-dk)">문제</b> ${esc(mem.problem)||'<span style="color:#b3a48f">—</span>'}</div>
      <div style="margin-top:2px"><b style="color:var(--teal)">아이디어</b> ${esc(mem.idea)||'<span style="color:#b3a48f">—</span>'}</div></div>
      <div style="display:flex;gap:8px;align-items:flex-start"><input type="text" placeholder="예: 교통, 이동, 안전" value="${esc(mem.keywords.join(', '))}" oninput="setKw(${idx},this.value)">
      <button class="aibtn" style="flex-shrink:0" onclick="aiKw(${idx})">✨ AI 추천</button></div>
      <div class="chips" id="chips${idx}"></div>
      <div id="sugg${idx}"></div>`;
    box.appendChild(d);drawChips(idx);drawSugg(idx);});}
function setKw(idx,val){state.members[idx].keywords=val.split(",").map(s=>s.trim()).filter(Boolean);drawChips(idx);}
function drawChips(idx){const c=$("#chips"+idx);if(!c)return;c.innerHTML=state.members[idx].keywords.map(k=>`<span class="chip sel">${esc(k)}</span>`).join("");}
async function aiKw(idx){const m=state.members[idx];
  const off=()=>aiExtractKeywords((m.problem||"")+" "+(m.idea||""));   // 문제+아이디어 둘 다 사용
  const box=$("#sugg"+idx);if(box)box.innerHTML='<div class="ailabel">✨ AI 추천 생성 중…</div>';
  try{const r=await aiCall('keywords',{problem:m.problem||"",idea:m.idea||""});m.kwSuggest=nounish((Array.isArray(r)&&r.length)?r:off());m._aiSrc='ai';}
  catch(e){m.kwSuggest=nounish(off());m._aiSrc=isQuota(e)?'quota':'off';}
  drawSugg(idx);}
function srcLabel(s){return s==='ai'?'✨ AI 추천':(s==='quota'?'⏳ 제미나이 사용량 초과 · 오프라인 추천(잠시 후 재시도)':'💡 키워드 추천');}
function drawSugg(idx){const box=$("#sugg"+idx);if(!box)return;const m=state.members[idx];
  if(!m.kwSuggest){box.innerHTML="";return;}
  const fresh=m.kwSuggest.filter(k=>!m.keywords.includes(k));
  box.innerHTML=`<div class="ailabel">${srcLabel(m._aiSrc)} 키워드 — 클릭해서 채택${fresh.length?"":" (모두 채택됨)"}</div>
    <div class="chips">${fresh.map(k=>`<span class="chip ai" onclick="adoptKw(${idx},'${esc(k)}')">+ ${esc(k)}</span>`).join("")||'<span style="font-size:12px;color:var(--muted)">추천 키워드가 모두 반영되었습니다.</span>'}</div>`;}
function adoptKw(idx,k){if(!state.members[idx].keywords.includes(k))state.members[idx].keywords.push(k);drawChips(idx);drawSugg(idx);
  const inp=$("#kwextract").querySelectorAll("input")[idx];if(inp)inp.value=state.members[idx].keywords.join(", ");}
async function runAiCommon(){const off=()=>aiCommonKeywords(state.members);
  const box=$("#aicommon");if(box)box.innerHTML='<div class="ailabel" style="margin-top:8px">✨ AI 공통 키워드 생성 중…</div>';
  try{const r=await aiCall('common',{members:state.members.map(m=>({name:m.name,keywords:m.keywords}))});state.aiCommon=(Array.isArray(r)&&r.length)?r:off();state.aiCommonSrc='ai';}
  catch(e){state.aiCommon=off();state.aiCommonSrc=isQuota(e)?'quota':'off';}
  renderAiCommon();}
function renderAiCommon(){const box=$("#aicommon");if(!box)return;
  if(!state.aiCommon){box.innerHTML="";return;}
  if(!state.aiCommon.length){box.innerHTML=`<div class="aibanner">먼저 ① 에서 키워드를 입력/채택하면 공통 묶음을 제안할 수 있어요.</div>`;return;}
  box.innerHTML=`<div class="ailabel" style="margin-top:8px">${srcLabel(state.aiCommonSrc)} 공통 키워드 3안 — '이 안 적용'으로 아래 직접 입력에 채웁니다</div>`+
    state.aiCommon.map((s,i)=>`<div class="aicard"><div class="rank">${i+1}</div>
      <div class="body"><div class="lab">${esc(s.label)} <span style="color:var(--muted);font-weight:400;font-size:12px">(${esc(s.keys.join(', '))})</span></div>
      <div class="mem">관련 인원: ${esc(s.members.join(', '))||'—'}</div></div>
      <button class="btn ghost" style="padding:8px 14px" onclick="applyCommon(${i})">이 안 적용</button></div>`).join("");}
function applyCommon(i){const s=state.aiCommon[i];let slot=state.clusters.find(c=>!c.label);if(!slot){slot=c();state.clusters.push(slot);}
  slot.label=s.label;slot.members=s.members.join(', ');renderClusters();}
function renderClusters(){const box=$("#clusters");box.innerHTML="";
  state.clusters.forEach((cl,idx)=>{const d=document.createElement("div");d.style.marginBottom="10px";
    d.innerHTML=`<div style="display:flex;gap:10px;align-items:center">
      <div style="width:30px;height:30px;border-radius:8px;background:var(--sea2);color:var(--ocean);display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0">${String.fromCharCode(65+idx)}</div>
      <input type="text" placeholder="공통 키워드 (예: 이동·접근성)" value="${esc(cl.label)}" oninput="state.clusters[${idx}].label=this.value">
      <input type="text" placeholder="관련 인원" style="max-width:170px" value="${esc(cl.members)}" oninput="state.clusters[${idx}].members=this.value">
      ${state.clusters.length>1?`<button class="del" onclick="delCluster(${idx})">×</button>`:""}</div>`;
    box.appendChild(d);});}
function addCluster(){state.clusters.push(c());renderClusters();}
function delCluster(i){state.clusters.splice(i,1);renderClusters();}

/* ===== step3 ===== */
function renderStep3(){
  const kw=state.clusters.filter(c=>c.label).map(c=>c.label).join(" · ")||"—";
  view.innerHTML=`<div class="panel">${phead(3)}
    <div class="prompt"><b>진행 발문</b> &nbsp;도출한 키워드를 아래 4개 대주제에 붙여보고, 가장 많이 모인 곳을 팀 대주제로 정하세요.</div>
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div class="idea-ref" style="margin:0;flex:1">STEP 2 공통 키워드: <b>${esc(kw)}</b></div>
      <button class="aibtn" onclick="runAiTheme()">✨ AI 대주제 추천</button></div>
    <div id="aitheme"></div>
    <div id="themes" style="margin-top:12px"></div>${nav(true)}</div>`;
  renderAiTheme();renderThemes();
}
async function runAiTheme(){const off=()=>aiRecommendTheme(state.members);
  const box=$("#aitheme");if(box)box.innerHTML='<div class="aibanner">✨ AI 대주제 추천 생성 중…</div>';
  try{const r=await aiCall('theme',{members:state.members.map(m=>({name:m.name,keywords:m.keywords})),themes:THEMES.map(t=>({key:t.key,subs:t.subs}))});
    state.aiThemeRank=(Array.isArray(r)&&r.length)?r:off();state.aiThemeSrc='ai';}
  catch(e){state.aiThemeRank=off();state.aiThemeSrc=isQuota(e)?'quota':'off';}
  renderAiTheme();renderThemes();}
function renderAiTheme(){const box=$("#aitheme");if(!box)return;
  if(!state.aiThemeRank){box.innerHTML="";return;}
  const top=state.aiThemeRank.find(r=>r.n>0);
  if(!top){box.innerHTML=`<div class="aibanner">키워드가 부족해요. STEP 2에서 키워드를 채운 뒤 다시 추천해 주세요.</div>`;return;}
  box.innerHTML=`<div class="aibanner">${srcLabel(state.aiThemeSrc)} <b>추천 대주제: ${esc(top.theme)}</b> &nbsp;— 붙은 키워드: ${esc((top.keys||[]).join(', '))}
    <div style="margin-top:6px;font-size:12.5px;color:#6b5ca5">전체 점수: ${state.aiThemeRank.filter(r=>r.n>0).map(r=>esc(r.theme)+' '+r.n).join(' · ')}</div></div>`;}
function renderThemes(){const box=$("#themes");box.innerHTML="";
  const maxV=Math.max(...THEMES.map(t=>state.themeVotes[t.key]),0);
  const rec=state.aiThemeRank?(state.aiThemeRank.find(r=>r.n>0)||{}).theme:null;
  THEMES.forEach((t,idx)=>{const on=state.selectedTheme===t.key;const isWin=maxV>0&&state.themeVotes[t.key]===maxV;const isRec=rec===t.key;
    const d=document.createElement("div");d.className="themecard"+(on?" on":"")+(isRec?" rec":"");
    d.innerHTML=`<div class="th" onclick="pickTheme('${t.key}')"><div class="tnum" style="background:${t.color}">${String(idx+1).padStart(2,"0")}</div>
      <h3>${t.key}${isRec?'<span class="tag ai">AI 추천</span>':''}${isWin?'<span class="tag win">최다</span>':''}</h3></div>
      <div class="sub-chips">${t.subs.map(s=>`<span>${s}</span>`).join("")}</div>
      <textarea placeholder="우리 팀 키워드가 이 주제에 연결되는 지점은…" oninput="state.themeNotes['${t.key}']=this.value">${esc(state.themeNotes[t.key])}</textarea>
      <div class="voterow"><span class="lbl">도트 투표</span><div class="vote"><button onclick="voteT('${t.key}',-1)">−</button><span class="cnt">${state.themeVotes[t.key]}</span><button onclick="voteT('${t.key}',1)">+</button></div>
      <span class="dots">${"●".repeat(Math.min(state.themeVotes[t.key],8))}</span>
      <button class="btn ${on?'tan':'ghost'}" style="margin-left:auto;padding:7px 16px" onclick="pickTheme('${t.key}')">${on?'✓ 선정됨':'이걸로 선정'}</button></div>`;
    box.appendChild(d);});}
function voteT(k,d){state.themeVotes[k]=Math.max(0,state.themeVotes[k]+d);renderThemes();}
function pickTheme(k){state.selectedTheme=k;if(!THEMES.find(t=>t.key===k).subs.includes(state.subtopic))state.subtopic="";renderThemes();}

/* ===== step4 ===== */
function renderStep4(){
  if(!state.selectedTheme){view.innerHTML=`<div class="panel">${phead(4)}<div class="prompt" style="background:#FDEDED"><b style="color:#c0392b">먼저 STEP 3에서 대주제를 선정해 주세요.</b></div>${nav(true)}</div>`;return;}
  const th=THEMES.find(t=>t.key===state.selectedTheme);
  view.innerHTML=`<div class="panel">${phead(4)}
    <div class="prompt"><b>진행 발문</b> &nbsp;선정한 대주제 안에서, 우리 아이디어가 가장 많이 겹치는 소주제를 입력하세요.</div>
    <div class="idea-ref">선정한 대주제: <b style="color:var(--tan-dk)">${esc(th.key)}</b></div>
    <label class="fl">후보 소주제 — 하나를 직접 입력</label>
    <div class="chips" id="subchips"></div>
    <input type="text" placeholder="직접 입력 (예: 교통 사각지대 이동권)" style="margin-top:10px" value="${esc(state.subtopic)}" oninput="state.subtopic=this.value;renderSubChips()">
    <label class="fl" style="margin-top:16px">우리 팀이 해결하고자 하는 문제 & 이유</label>
    <textarea placeholder="우리 팀이 이 해결하고자 하는 문제는…" oninput="state.subReason=this.value">${esc(state.subReason)}</textarea>${nav(true)}</div>`;
  renderSubChips();
}
function renderSubChips(){const th=THEMES.find(t=>t.key===state.selectedTheme);const box=$("#subchips");if(!box)return;
  box.innerHTML=th.subs.map(s=>`<span class="chip ${state.subtopic===s?'sel':''}" onclick="setSub('${s}')">${s}</span>`).join("");}
function setSub(s){state.subtopic=s;const inp=$(".panel input[type=text]");if(inp)inp.value=s;renderSubChips();}

/* ===== step5 ===== */
function renderStep5(){
  view.innerHTML=`<div class="panel">${phead(5)}
    <div class="prompt"><b>진행 발문</b> &nbsp;팀명을 정하고, 소주제를 한 문장의 팀 주제로 만든 뒤 4명의 역할을 나누세요.</div>
    <label class="fl">팀명</label>
    <input type="text" id="teamNameInput" placeholder="예: 링크 제주" value="${esc(state.teamName)}" oninput="state.teamName=this.value">
    <label class="fl" style="margin-top:16px">팀 주제 (한 문장)</label>
    <input type="text" id="teamTopicInput" placeholder='예: "AI 수요응답형 교통(DRT)과 안전 도로로 제주 교통 사각지대 해소"' value="${esc(state.teamTopic)}" oninput="state.teamTopic=this.value">
    <label class="fl" style="margin-top:16px">역할 · 지분 분배</label>
    <div id="roles"></div>${nav(true,"결과 보기 →")}</div>`;
  renderRoles();
}
function renderRoles(){const box=$("#roles");box.innerHTML="";
  state.members.forEach((mem,idx)=>{const d=document.createElement("div");d.style.marginBottom="10px";
    d.innerHTML=`<div style="display:flex;gap:10px;align-items:flex-start"><div class="mnum" style="margin-top:6px">${idx+1}</div>
      <div style="flex:1"><div style="font-weight:700;margin-bottom:4px">${esc(mem.name||('팀원 '+(idx+1)))}${isMine(mem)?' <span class="mebadge">나</span>':''}</div>
      <div class="grid2"><input type="text" placeholder="맡을 역할" value="${esc(mem.rolePart||'')}" oninput="state.members[${idx}].rolePart=this.value">
      <input type="text" placeholder="내 원래 아이디어와의 연결" value="${esc(mem.roleLink||'')}" oninput="state.members[${idx}].roleLink=this.value"></div></div></div>`;
    box.appendChild(d);});}

/* ===== result ===== */
function renderResult(){
  const th=state.selectedTheme||"—";
  const kw=state.clusters.filter(c=>c.label).map(c=>c.label).join(" · ")||"—";
  const topic=state.teamTopic||"—";
  view.innerHTML=`<div class="panel">${phead(6)}
    <div class="result-hero">
      <div class="teamname">🏴 ${esc(state.teamName||'(팀명 미정)')} · ${esc(state.user.team)}</div>
      <div class="path">세부내용 → <b>${esc(kw)}</b> → 대주제 <b>${esc(th)}</b> → 소주제 <b>${esc(state.subtopic||'—')}</b> → 팀 주제</div>
      <h2>${esc(topic)}</h2></div>
    <div class="rbox" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <h4 style="margin:0">💡 아이디어 도출</h4>
        <button class="aibtn" onclick="runAiIdeas()">✨ AI 아이디어 추천</button></div>
      <div id="ideaSugg"></div>
      <textarea id="ideaMemo" style="margin-top:10px" placeholder="팀의 핵심 아이디어를 간략히 적어보세요 (AI 추천을 담아 다듬어도 좋아요)" oninput="state.ideaMemo=this.value">${esc(state.ideaMemo)}</textarea>
    </div>
    <div class="rgrid">
      <div class="rbox"><h4>1분 피치 템플릿</h4><div class="pitch">우리 팀 <b>${esc(state.teamName||'___')}</b>은(는) <b>${esc(th)}</b>의 <b>${esc(state.subtopic||'___')}</b> 문제를 <b>${esc(topic)}</b>(으)로 해결한다.<br><br>핵심 아이디어를 4명이 나눠 맡는다.</div></div>
      <div class="rbox"><h4>확정 체크리스트</h4><div id="checks"></div></div></div>
    <div class="rbox" style="margin-top:14px"><h4>역할 · 지분</h4>
      <table class="roletbl"><thead><tr><th style="width:22%">이름</th><th>맡을 역할</th><th style="width:34%">원래 아이디어와의 연결</th></tr></thead>
      <tbody>${state.members.map(mm=>`<tr><td><b>${esc(mm.name||'—')}</b></td><td>${esc(mm.rolePart||'—')}</td><td>${esc(mm.roleLink||'—')}</td></tr>`).join("")}</tbody></table></div>
    <div class="navbtns"><button class="btn ghost" onclick="go(-1)">← 이전</button>
      <div style="display:flex;gap:10px"><button class="btn ghost" onclick="copySummary()" id="copybtn">📋 요약 복사</button><button class="btn tan" onclick="savePDF()" id="pdfbtn">📄 전체 과정 PDF 저장</button></div></div></div>`;
  renderChecks();renderIdeaSugg();
}
async function runAiIdeas(){const off=()=>aiIdeas(state);
  const box=$("#ideaSugg");if(box)box.innerHTML='<div class="ailabel" style="margin-top:10px">✨ AI 아이디어 생성 중…</div>';
  try{const r=await aiCall('ideas',{theme:state.selectedTheme,subtopic:state.subtopic,
      keywords:state.clusters.filter(c=>c.label).map(c=>c.label),members:state.members.map(m=>({problem:m.problem,idea:m.idea}))});
    state.aiIdeaList=(Array.isArray(r)&&r.length)?r:off();state.aiIdeaSrc='ai';}
  catch(e){state.aiIdeaList=off();state.aiIdeaSrc=isQuota(e)?'quota':'off';}
  renderIdeaSugg();}
function ideaText(t){if(t&&typeof t==='object')return {title:t.title||'',desc:t.desc||t.title||''};return {title:'',desc:String(t)};}
function renderIdeaSugg(){const box=$("#ideaSugg");if(!box)return;
  if(!state.aiIdeaList){box.innerHTML="";return;}
  box.innerHTML=`<div class="ailabel" style="margin-top:10px">${srcLabel(state.aiIdeaSrc)} 아이디어 3안 — '담기'로 메모에 추가</div>`+
    state.aiIdeaList.map((t,i)=>{const o=ideaText(t);return `<div class="aicard"><div class="rank">${i+1}</div><div class="body">
      ${o.title?`<div class="lab">${esc(o.title)}</div>`:''}
      <div style="font-size:13px;color:var(--muted);margin-top:${o.title?'2px':'0'}">${esc(o.desc)}</div></div>
    <button class="btn ghost" style="padding:8px 14px;align-self:flex-start" onclick="addIdea(${i})">담기</button></div>`;}).join("");}
function addIdea(i){const o=ideaText(state.aiIdeaList[i]);const line=(o.title?o.title+': ':'')+o.desc;

function copySummary(){const th=state.selectedTheme||"—";const kw=state.clusters.filter(c=>c.label).map(c=>c.label).join(" · ")||"—";const nm=(m,i)=>m.name||('팀원'+(i+1));

function buildStateFor(k){const st=state._admin[k]||{};
  return Object.assign({members:[],clusters:[],themeVotes:{},checks:[],selectedTheme:null,subtopic:"",subReason:"",teamName:"",teamTopic:"",ideaMemo:""},st,{user:{team:TEAM_LABEL[k]}});}
function progressOf(st){let n=0;
  if((st.members||[]).some(m=>m.idea||m.problem))n++;
  if((st.members||[]).some(m=>(m.keywords||[]).length)||(st.clusters||[]).some(c=>c.label))n++;
  if(st.selectedTheme)n++; if(st.subtopic)n++; if(st.teamTopic)n++;
  return n;}
async function adminLoad(){
  if(now()<adminSuppressLoadUntil)return;   // 초기화 직후 잠시 재로딩 보류
  const sb=supaClient(); if(!sb)return;
  try{const {data,error}=await sb.from('workspaces').select('team_code,state');
    if(error){console.warn('[admin] load',error.message);return;}
    (data||[]).forEach(r=>{if(r&&r.state)state._admin[r.team_code]=r.state;});
    if(state.adminMode)renderAdmin();
  }catch(e){console.warn('[admin]',e);}}
function adminConnect(){
  const sb=supaClient();
  if(sb){
    TEAM_KEYS.forEach(k=>{
      const ch=sb.channel('room-'+k,{config:{broadcast:{self:false}}});
      ch.on('broadcast',{event:'state'},({payload})=>{if(payload&&payload.state){state._admin[k]=payload.state;if(state.adminMode)renderAdmin();}}).subscribe();
      SUPA.adminChans.push(ch);
    });
    adminLoad();
    SUPA.adminTimer=setInterval(adminLoad,6000);
  }
}
function exitAdmin(){

  return {members:[m(),m(),m(),m()],clusters:[c(),c(),c()],themeNotes:tn,themeVotes:tv,selectedTheme:null,subtopic:"",subReason:"",teamName:"",teamTopic:"",ideaMemo:"",checks:[false,false,false,false,false]};}

let adminSuppressLoadUntil=0;
async function doReset(k){

    try{const ch=SUPA.adminChans.find(c=>c&&c.topic&&String(c.topic).indexOf('room-'+t)>=0);
      if(ch)ch.send({type:'broadcast',event:'reset',payload:{state:fresh}});}catch(e){console.warn('[reset bc]',e);}
    // DB에 초기화 상태 확실히 저장(대기)

/* ===== 전체 과정 리포트 HTML (st: 특정 팀 상태, 없으면 현재) ===== */
function reportHTML(st){st=st||state;
  const members=st.members||[],clusters=st.clusters||[],votes=st.themeVotes||{},checks=st.checks||[];
  const teamLabel=(st.user&&st.user.team)||'';
  const th=st.selectedTheme||'—';

  const H=(t)=>`<div style="font-size:15px;font-weight:700;color:#5A4A42;margin:18px 0 6px;border-bottom:2px solid #FEE500;padding-bottom:4px">${t}</div>`;
  const nm=(m,i)=>esc(m.name||('팀원'+(i+1)));
  let h=`<div style="font-family:'Kakao Small Sans','Malgun Gothic','Noto Sans KR',sans-serif;color:#2E2622;line-height:1.6">`;
  h+=`<div style="background:#3A2E28;color:#fff;border-radius:10px;padding:16px 18px;margin-bottom:8px">
      <div style="color:#E8712B;font-weight:700;font-size:13px">역방향 팀빌딩 전체 과정 · ${esc(st.teamName||'(팀명 미정)')} · ${esc(teamLabel)}</div>

      <div style="font-size:18px;font-weight:700">${esc(st.teamTopic||'—')}</div></div>`;
  h+=H('STEP 1 · 개인 문제와 아이디어');
  h+=`<table style="width:100%;border-collapse:collapse;font-size:12px"><tr style="background:#5A4A42;color:#fff"><td style="padding:7px;width:16%">이름</td><td style="padding:7px">해결하고 싶은 문제</td><td style="padding:7px">해결 아이디어</td></tr>`;
  members.forEach((m,i)=>{h+=`<tr><td style="border:1px solid #EADFC4;padding:7px;font-weight:700">${nm(m,i)}</td><td style="border:1px solid #EADFC4;padding:7px">${esc(m.problem||'—')}</td><td style="border:1px solid #EADFC4;padding:7px">${esc(m.idea||'—')}</td></tr>`;});

  h+=H('STEP 2 · 키워드 & 공통 키워드');
  h+=`<div style="font-size:12px">`;

  const cl=clusters.filter(c=>c.label);
  if(cl.length){h+=`<div style="margin-top:8px;font-weight:700">공통 키워드 묶음</div>`;cl.forEach(c=>{h+=`<div style="margin:2px 0">• <b>${esc(c.label)}</b>${c.members?` <span style="color:#8A7F72">(${esc(c.members)})</span>`:''}</div>`;});}
  h+=`</div>`;
  h+=H('STEP 3 · 대주제 선정 (투표 결과)');
  h+=`<div style="font-size:12px">`;
  THEMES.forEach(t=>{const sel=st.selectedTheme===t.key;h+=`<div style="margin:3px 0">${sel?'✅ ':'▫️ '}<b>${esc(t.key)}</b> — ${votes[t.key]||0}표${sel?' <span style="color:#E8712B;font-weight:700">← 선정</span>':''}</div>`;});
  h+=`</div>`;
  h+=H('STEP 4 · 소주제');
  h+=`<div style="font-size:12px"><b style="color:#CE5E1E">${esc(st.subtopic||'—')}</b>${st.subReason?`<div style="color:#8A7F72;margin-top:3px">이유: ${esc(st.subReason)}</div>`:''}</div>`;

  h+=`<table style="width:100%;border-collapse:collapse;font-size:12px"><tr style="background:#8A7A6E;color:#fff"><td style="padding:7px;width:16%">이름</td><td style="padding:7px">맡을 부분</td><td style="padding:7px">아이디어 연결</td></tr>`;

/* ===== 전체 과정 PDF 저장 ===== */
async function savePDFTeam(k){return savePDF(buildStateFor(k),k);}
async function savePDF(st,btnId){st=st||state;
  const btn=$("#"+(btnId?('pdf_'+btnId):'pdfbtn'));
  const fname=(st.teamName||(st.user&&st.user.team)||'팀')+'_역방향팀빌딩_전체과정.pdf';
  const orig=btn?btn.textContent:'';
  const wrap=document.createElement('div');
  wrap.style.cssText='position:absolute;left:-99999px;top:0;width:760px;background:#fff;padding:30px;box-sizing:border-box';
  wrap.innerHTML=reportHTML(st);document.body.appendChild(wrap);
  try{
    if(typeof window.html2canvas==='function'&&window.jspdf&&window.jspdf.jsPDF){
      if(btn){btn.textContent="저장 중…";btn.disabled=true;}
      const canvas=await window.html2canvas(wrap,{scale:2,backgroundColor:'#ffffff'});
      const img=canvas.toDataURL('image/png');
      const {jsPDF}=window.jspdf;const pdf=new jsPDF('p','mm','a4');
      const pw=210, ph=canvas.height*pw/canvas.width, pageH=297;
      if(ph<=pageH){pdf.addImage(img,'PNG',0,0,pw,ph);}
      else{let left=ph,pos=0;while(left>0){pdf.addImage(img,'PNG',0,pos,pw,ph);left-=pageH;pos-=pageH;if(left>0)pdf.addPage();}}
      pdf.save(fname);
    } else {
      const w=window.open('','_blank');
      if(w){w.document.write('<html><head><meta charset="utf-8"><title>'+fname+'</title></head><body>'+reportHTML(st)+'</body></html>');w.document.close();w.focus();setTimeout(()=>w.print(),300);}
      else window.print();
    }
  }catch(e){console.warn('pdf',e);window.print();}
  finally{document.body.removeChild(wrap);if(btn){btn.textContent=orig||"📄 전체 과정 PDF 저장";btn.disabled=false;}}
}
/* ===== 실시간 동기화 트리거(위임 리스너) ===== */
document.addEventListener('input',scheduleSync,true);
document.addEventListener('click',()=>setTimeout(scheduleSync,0),true);

render();
</script>
</body>
